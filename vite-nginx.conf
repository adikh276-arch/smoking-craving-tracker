server {
    listen 80;

    location = / {
        return 301 /smoke_craving_tracker/;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /smoke_craving_tracker/index.html;
    }

    error_page 404 /smoke_craving_tracker/index.html;
}
